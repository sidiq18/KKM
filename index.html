<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi KKM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#F3EFE4;
    --surface:#FFFFFF;
    --surface-alt:#EAE3D2;
    --ink:#2B2A22;
    --ink-muted:#786F58;
    --accent-green:#3F6B4E;
    --accent-green-light:#E4EEE3;
    --accent-clay:#C1703D;
    --accent-clay-light:#F5E4D3;
    --danger:#B24435;
    --danger-light:#F6E1DC;
    --border:#DAD2BC;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding:20px 18px 60px;}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);}
  .top{margin-bottom:22px;}
  .top h1{font-size:22px;font-weight:800;line-height:1.2;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer;transition:transform .08s ease, opacity .15s ease;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent-green);color:#fff;}
  .btn-primary:hover{opacity:.92;}
  .btn-clay{background:var(--accent-clay);color:#fff;}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
  .btn-danger{background:var(--danger-light);color:var(--danger);}
  .btn-ghost{background:transparent;color:var(--ink-muted);font-weight:500;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-muted);margin-bottom:6px;}
  input,select{width:100%;padding:11px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-family:'Inter',sans-serif;font-size:14.5px;color:var(--ink);}
  input:focus,select:focus{outline:2px solid var(--accent-green);outline-offset:1px;}
  .field{margin-bottom:12px;}
  .pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .pill-green{background:var(--accent-green-light);color:var(--accent-green);}
  .pill-clay{background:var(--accent-clay-light);color:var(--accent-clay);}
  .pill-danger{background:var(--danger-light);color:var(--danger);}
  .pill-muted{background:var(--surface-alt);color:var(--ink-muted);}
  .tabbar{display:flex;background:var(--surface-alt);border-radius:11px;padding:4px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-muted);}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .role-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;text-align:left;cursor:pointer;width:100%;}
  .role-btn:hover{border-color:var(--accent-green);}
  .role-btn .eyebrow{margin-bottom:6px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);padding:6px 8px;border-bottom:1.5px solid var(--border);font-family:'JetBrains Mono',monospace;}
  td{padding:9px 8px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  .muted{color:var(--ink-muted);}
  .small{font-size:12.5px;}
  .member-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .member-row:last-child{border-bottom:none;}
  .back-link{display:inline-flex;align-items:center;gap:4px;color:var(--ink-muted);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;}
  .stamp-overlay{position:fixed;inset:0;background:rgba(43,42,34,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .stamp-card{background:var(--surface);border-radius:18px;padding:32px 24px;max-width:340px;width:100%;text-align:center;animation:popIn .28s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
  .stamp{width:120px;height:120px;border-radius:50%;border:3px dashed currentColor;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;transform:rotate(-8deg);}
  .stamp span{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;letter-spacing:.03em;}
  .stamp.ok{color:var(--accent-green);}
  .stamp.bad{color:var(--danger);}
  .period-card{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:11px;background:var(--surface-alt);margin-bottom:10px;}
  .period-card .label{font-weight:700;font-size:14px;}
  .banner{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;}
  .banner-danger{background:var(--danger-light);color:var(--danger);}
  .banner-green{background:var(--accent-green-light);color:var(--accent-green);}
  .empty{text-align:center;padding:30px 10px;color:var(--ink-muted);font-size:13.5px;}
  .footer-note{text-align:center;font-size:11.5px;color:var(--ink-muted);margin-top:24px;font-family:'JetBrains Mono',monospace;}
  .qr-box{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:12px;border:1px solid var(--border);margin-top:6px;}
  .qr-video-wrap{width:100%;aspect-ratio:1/1;background:#111;border-radius:12px;overflow:hidden;}
  #qr_video{width:100%;height:100%;object-fit:cover;display:block;}
  ::selection{background:var(--accent-green-light);}
</style>
</head>
<body>
<div id="app"></div>

<script>
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
 //https://firebase.google.com/docs/web/setup#available-libraries

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const firebaseConfig = {
  apiKey: "AIzaSyDyk9VP55b1StxDCfcss5SbWE0Yz6nIWeM",
  authDomain: "absensi-kkm.firebaseapp.com",
  projectId: "absensi-kkm",
  storageBucket: "absensi-kkm.firebasestorage.app",
  messagingSenderId: "513660198819",
  appId: "1:513660198819:web:0e5556346cd30cc6438416",
  measurementId: "G-8MWNNPE4TV"
};
let db = null;
function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

/* ---------- storage helpers (Firestore-backed, same key/value shape as before) ---------- */
const K_CONFIG = 'kkm_config';
const K_MEMBERS = 'kkm_members';
const attKey = (id) => 'kkm_attendance_' + id;

async function sget(key){
  try{
    const snap = await db.collection('kv').doc(key).get();
    return snap.exists ? JSON.parse(snap.data().value) : null;
  } catch(e){ console.error('firestore get failed', e); return null; }
}
async function sset(key, value){
  try{
    await db.collection('kv').doc(key).set({ value: JSON.stringify(value) });
    return true;
  } catch(e){ console.error('firestore set failed', e); return null; }
}

/* ---------- utils ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }
function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function nowHM(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function nowHMS(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function genId(){ return 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function genPin(){ return String(Math.floor(1000 + Math.random()*9000)); }
function genQrToken(){
  return Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return d + ' ' + bulan[parseInt(m,10)-1] + ' ' + y;
}
function haversine(lat1,lng1,lat2,lng2){
  const R = 6371000;
  const toRad = x => x * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getPeriod(config, hm){
  hm = hm || nowHM();
  if(hm >= config.morningStart && hm <= config.morningEnd) return 'pagi';
  if(hm >= config.eveningStart && hm <= config.eveningEnd) return 'sore';
  return null;
}
function escCsv(v){
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}

/* ---------- state ---------- */
let state = {
  view: 'loading',
  config: null,
  members: [],
  adminSubview: 'rekap',
  currentMember: null,
  errorMsg: null,
  busy: false,
  addMemberError: null,
  lastCreatedPin: null,
  rekapExpanded: null,
  editLocationMsg: null,
};

const app = document.getElementById('app');

async function boot(){
  if(firebaseConfig.apiKey === 'ISI_API_KEY_DISINI'){
    app.innerHTML = `
      <div class="card">
        <h3 style="font-size:16px;margin-bottom:8px;">Firebase belum dikonfigurasi</h3>
        <p class="small muted">Buka file HTML ini, isi objek <code>firebaseConfig</code> di bagian atas &lt;script&gt; dengan konfigurasi project Firebase kamu, lalu simpan dan muat ulang halaman.</p>
      </div>`;
    return;
  }
  initFirebase();
  state.config = await sget(K_CONFIG);
  state.members = (await sget(K_MEMBERS)) || [];
  state.view = 'landing';
  render();
}

/* ---------- render dispatcher ---------- */
function render(){
  app.innerHTML = '';
  if(state.view === 'loading') app.innerHTML = '<div class="empty">Memuat…</div>';
  else if(state.view === 'landing') renderLanding();
  else if(state.view === 'adminSetup') renderAdminSetup();
  else if(state.view === 'adminLogin') renderAdminLogin();
  else if(state.view === 'memberLogin') renderMemberLogin();
  else if(state.view === 'memberNoConfig') renderMemberNoConfig();
  else if(state.view === 'adminDashboard') renderAdminDashboard();
  else if(state.view === 'memberDashboard') renderMemberDashboard();
}

function backLink(label, toView){
  const a = document.createElement('div');
  a.className = 'back-link';
  a.textContent = '\u2190 ' + label;
  a.onclick = () => { state.view = toView; state.errorMsg=null; render(); };
  return a;
}

/* ---------- LANDING ---------- */
function renderLanding(){
  const wrap = document.createElement('div');
  const title = state.config ? state.config.name : 'Absensi Kelompok';
  wrap.innerHTML = `
    <div class="top">
      <div class="eyebrow">Absensi Lapangan</div>
      <h1>${title}</h1>
      <p class="small muted" style="margin-top:6px;">Absen pagi &amp; sore, dengan verifikasi lokasi.</p>
    </div>
  `;
  const roleWrap = document.createElement('div');
  roleWrap.className = 'stack';

  const memberBtn = document.createElement('button');
  memberBtn.className = 'role-btn';
  memberBtn.innerHTML = `<div class="eyebrow">Anggota</div><h3 style="font-size:17px;">Absen Sekarang</h3><div class="small muted" style="margin-top:4px;">Login dengan nama &amp; PIN</div>`;
  memberBtn.onclick = () => {
    if(!state.config || state.members.length === 0){ state.view = 'memberNoConfig'; }
    else state.view = 'memberLogin';
    render();
  };

  const adminBtn = document.createElement('button');
  adminBtn.className = 'role-btn';
  adminBtn.innerHTML = `<div class="eyebrow">Ketua Kelompok</div><h3 style="font-size:17px;">Kelola &amp; Rekap</h3><div class="small muted" style="margin-top:4px;">${state.config ? 'Login admin' : 'Setup pertama kali'}</div>`;
  adminBtn.onclick = () => {
    state.view = state.config ? 'adminLogin' : 'adminSetup';
    render();
  };

  roleWrap.appendChild(memberBtn);
  roleWrap.appendChild(adminBtn);
  wrap.appendChild(roleWrap);
  wrap.appendChild(elFooter());
  app.appendChild(wrap);
}

function elFooter(){
  const f = document.createElement('div');
  f.className = 'footer-note';
  f.textContent = 'DATA TERSIMPAN &amp; DAPAT DILIHAT SELURUH ANGGOTA KELOMPOK'.replace('&amp;','&');
  return f;
}

/* ---------- MEMBER: no config yet ---------- */
function renderMemberNoConfig(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  wrap.innerHTML += `
    <div class="card">
      <h3 style="font-size:16px;margin-bottom:8px;">Belum ada data</h3>
      <p class="small muted">Kelompok ini belum diatur. Minta ketua kelompok untuk melakukan setup awal dan menambahkan nama Anda sebagai anggota.</p>
    </div>
  `;
  app.appendChild(wrap);
}

/* ---------- ADMIN SETUP (first time) ---------- */
function renderAdminSetup(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  wrap.innerHTML += `
    <div class="top"><div class="eyebrow">Setup Awal</div><h1>Atur Kelompok</h1></div>
  `;
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>Nama Kelompok</label><input id="f_name" placeholder="KKM 33 Sukalaksana"></div>
    <div class="field"><label>Buat PIN Admin (untuk Anda, ketua kelompok)</label><input id="f_adminpin" placeholder="mis. 190400" inputmode="numeric"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Absen Pagi</label><input id="f_ms" type="time" value="06:00"></div>
      <div class="field" style="flex:1;"><label>Selesai Absen Pagi</label><input id="f_me" type="time" value="10:00"></div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Absen Sore</label><input id="f_es" type="time" value="15:00"></div>
      <div class="field" style="flex:1;"><label>Selesai Absen Sore</label><input id="f_ee" type="time" value="19:00"></div>
    </div>
    <div class="field">
      <label>Titik Lokasi KKM</label>
      <button class="btn btn-outline" id="btn_locate" type="button">📍 Gunakan Lokasi Saat Ini</button>
      <div id="loc_status" class="small muted" style="margin-top:8px;">Berdiri di lokasi KKM, lalu tekan tombol di atas.</div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label class="mono">Latitude</label><input id="f_lat" placeholder="-6.xxxxx"></div>
      <div class="field" style="flex:1;"><label class="mono">Longitude</label><input id="f_lng" placeholder="106.xxxxx"></div>
    </div>
    <div class="field"><label>Radius Toleransi (meter)</label><input id="f_radius" type="number" value="100" inputmode="numeric"></div>
    <div id="setup_err"></div>
    <button class="btn btn-primary" id="btn_save_setup">Simpan &amp; Masuk sebagai Admin</button>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);

  document.getElementById('btn_locate').onclick = () => {
    const statusEl = document.getElementById('loc_status');
    statusEl.textContent = 'Mengambil lokasi…';
    if(!navigator.geolocation){ statusEl.textContent = 'Perangkat tidak mendukung geolocation.'; return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('f_lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('f_lng').value = pos.coords.longitude.toFixed(6);
        statusEl.textContent = 'Lokasi berhasil diambil (akurasi ~' + Math.round(pos.coords.accuracy) + 'm).';
      },
      err => { statusEl.textContent = 'Gagal mengambil lokasi: ' + err.message + '. Anda bisa isi manual.'; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  };

  document.getElementById('btn_save_setup').onclick = async () => {
    const name = document.getElementById('f_name').value.trim();
    const adminPin = document.getElementById('f_adminpin').value.trim();
    const ms = document.getElementById('f_ms').value, me = document.getElementById('f_me').value;
    const es = document.getElementById('f_es').value, ee = document.getElementById('f_ee').value;
    const lat = parseFloat(document.getElementById('f_lat').value);
    const lng = parseFloat(document.getElementById('f_lng').value);
    const radius = parseInt(document.getElementById('f_radius').value, 10);
    const errEl = document.getElementById('setup_err');
    if(!name || !adminPin || !ms || !me || !es || !ee || isNaN(lat) || isNaN(lng) || isNaN(radius)){
      errEl.innerHTML = '<div class="banner banner-danger">Lengkapi semua data, termasuk lokasi.</div>';
      return;
    }
    const config = { name, adminPin, morningStart: ms, morningEnd: me, eveningStart: es, eveningEnd: ee, lat, lng, radius };
    await sset(K_CONFIG, config);
    state.config = config;
    state.view = 'adminDashboard';
    state.adminSubview = 'anggota';
    render();
  };
}

/* ---------- ADMIN LOGIN ---------- */
function renderAdminLogin(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  wrap.innerHTML += `<div class="top"><div class="eyebrow">Ketua Kelompok</div><h1>Login Admin</h1></div>`;
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>PIN Admin</label><input id="f_pin" type="password" inputmode="numeric" placeholder="••••••"></div>
    <div id="login_err"></div>
    <button class="btn btn-primary" id="btn_login">Masuk</button>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);
  document.getElementById('btn_login').onclick = () => {
    const pin = document.getElementById('f_pin').value.trim();
    if(pin === state.config.adminPin){
      state.view = 'adminDashboard';
      state.adminSubview = 'rekap';
      render();
    } else {
      document.getElementById('login_err').innerHTML = '<div class="banner banner-danger">PIN salah.</div>';
    }
  };
}

/* ---------- MEMBER LOGIN ---------- */
function renderMemberLogin(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  wrap.innerHTML += `<div class="top"><div class="eyebrow">Anggota</div><h1>Login</h1></div>`;
  const card = document.createElement('div');
  card.className = 'card stack';
  const opts = state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  card.innerHTML = `
    <div class="field"><label>Nama</label><select id="f_member"><option value="">Pilih nama…</option>${opts}</select></div>
    <div class="field"><label>PIN</label><input id="f_pin" type="password" inputmode="numeric" placeholder="••••"></div>
    <div id="login_err"></div>
    <button class="btn btn-primary" id="btn_login">Masuk</button>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);
  document.getElementById('btn_login').onclick = () => {
    const id = document.getElementById('f_member').value;
    const pin = document.getElementById('f_pin').value.trim();
    const m = state.members.find(x => x.id === id);
    if(m && pin === m.pin){
      state.currentMember = m;
      state.view = 'memberDashboard';
      render();
    } else {
      document.getElementById('login_err').innerHTML = '<div class="banner banner-danger">Nama atau PIN salah.</div>';
    }
  };
}

/* ---------- MEMBER DASHBOARD ---------- */
async function renderMemberDashboard(){
  const wrap = document.createElement('div');
  const topBar = document.createElement('div');
  topBar.style = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;';
  topBar.innerHTML = `
    <div><div class="eyebrow">Halo</div><h1 style="font-size:20px;">${state.currentMember.name}</h1></div>
  `;
  const logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn btn-ghost';
  logoutBtn.style = 'width:auto;padding:8px 12px;';
  logoutBtn.textContent = 'Keluar';
  logoutBtn.onclick = () => { state.currentMember = null; state.view = 'landing'; render(); };
  topBar.appendChild(logoutBtn);
  wrap.appendChild(topBar);

  const records = (await sget(attKey(state.currentMember.id))) || [];
  const todayRecs = records.filter(r => r.date === todayStr());

  const scanCard = document.createElement('div');
  scanCard.className = 'card';
  const period = getPeriod(state.config);
  const alreadyForPeriod = period ? todayRecs.find(r => r.period === period) : null;

  let btnLabel = 'Absen Sekarang';
  let btnDisabled = false;
  if(!period){ btnDisabled = true; btnLabel = 'Belum Waktu Absen'; }
  else if(alreadyForPeriod){ btnDisabled = true; btnLabel = 'Sudah Absen ' + (period === 'pagi' ? 'Pagi' : 'Sore'); }

  scanCard.innerHTML = `
    <div class="eyebrow" style="margin-bottom:10px;">Absen Hari Ini · ${fmtDate(todayStr())}</div>
    ${periodCardHtml('pagi', todayRecs, state.config)}
    ${periodCardHtml('sore', todayRecs, state.config)}
    <button class="btn ${btnDisabled ? 'btn-outline' : 'btn-primary'}" id="btn_scan" ${btnDisabled ? 'disabled' : ''} style="margin-top:6px;">${btnLabel}</button>
    <div class="small muted" style="margin-top:8px;">${btnDisabled ? '' : 'Anda akan diminta memindai QR di lokasi, lalu izin lokasi.'}</div>
    <div id="scan_status" class="small muted" style="margin-top:4px;"></div>
  `;
  wrap.appendChild(scanCard);

  const histCard = document.createElement('div');
  histCard.className = 'card';
  const sorted = [...records].sort((a,b) => (a.date+a.period < b.date+b.period ? 1 : -1));
  histCard.innerHTML = `<div class="eyebrow" style="margin-bottom:10px;">Riwayat Absensi</div>` + (
    sorted.length === 0
      ? `<div class="empty">Belum ada riwayat.</div>`
      : `<table><thead><tr><th>Tanggal</th><th>Periode</th><th>Jam</th><th>Status</th></tr></thead><tbody>` +
        sorted.map(r => `<tr>
            <td>${fmtDate(r.date)}</td>
            <td style="text-transform:capitalize;">${r.period}</td>
            <td class="mono">${r.time}</td>
            <td>${statusPill(r)}</td>
          </tr>`).join('') +
        `</tbody></table>`
  );
  wrap.appendChild(histCard);
  app.appendChild(wrap);

  if(!btnDisabled){
    document.getElementById('btn_scan').onclick = () => openQrScanner(() => finalizeScan(records));
  }
}

function periodCardHtml(period, todayRecs, config){
  const rec = todayRecs.find(r => r.period === period);
  const label = period === 'pagi' ? 'Pagi' : 'Sore';
  const window = period === 'pagi' ? `${config.morningStart}–${config.morningEnd}` : `${config.eveningStart}–${config.eveningEnd}`;
  let right;
  if(rec) right = statusPill(rec) + ` <span class="mono small muted">${rec.time}</span>`;
  else right = `<span class="pill pill-muted">${window}</span>`;
  return `<div class="period-card"><div class="label">${label}</div><div>${right}</div></div>`;
}

function statusPill(rec){
  return rec.valid
    ? `<span class="pill pill-green">Hadir</span>`
    : `<span class="pill pill-danger">Luar Radius</span>`;
}

async function openQrScanner(onValidToken){
  const overlay = document.createElement('div');
  overlay.className = 'stamp-overlay';
  overlay.innerHTML = `
    <div class="stamp-card" style="max-width:340px;">
      <div class="eyebrow" style="margin-bottom:8px;">Pindai QR Absen</div>
      <div class="qr-video-wrap"><video id="qr_video" playsinline muted></video></div>
      <div id="qr_cam_status" class="small muted" style="margin-top:10px;">Mengaktifkan kamera…</div>
      <div style="margin-top:14px;text-align:left;">
        <label>Atau masukkan kode manual</label>
        <div class="row">
          <input id="qr_manual" placeholder="KODE-QR" style="flex:1;text-transform:uppercase;">
          <button class="btn btn-outline" id="btn_qr_manual" style="width:auto;padding:11px 14px;">Cek</button>
        </div>
      </div>
      <div id="qr_err"></div>
      <button class="btn btn-ghost" id="btn_qr_cancel" style="margin-top:8px;">Batal</button>
    </div>
  `;
  document.body.appendChild(overlay);

  let stream = null;
  let stopped = false;
  const video = document.getElementById('qr_video');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const camStatus = document.getElementById('qr_cam_status');

  function cleanup(){
    stopped = true;
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(overlay.parentNode) document.body.removeChild(overlay);
  }
  document.getElementById('btn_qr_cancel').onclick = cleanup;

  async function checkToken(value){
    const errEl = document.getElementById('qr_err');
    const fresh = await sget(K_CONFIG);
    const val = (value || '').trim().toUpperCase();
    if(fresh && fresh.qrToken && val === fresh.qrToken.toUpperCase()){
      cleanup();
      onValidToken();
    } else if(errEl){
      errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Kode QR tidak valid atau sudah kadaluarsa. Minta admin tampilkan QR terbaru.</div>';
    }
  }
  document.getElementById('btn_qr_manual').onclick = () => checkToken(document.getElementById('qr_manual').value);

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    camStatus.textContent = 'Kamera tidak tersedia di perangkat/browser ini. Gunakan kode manual di bawah.';
    return;
  }
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    if(stopped){ stream.getTracks().forEach(t => t.stop()); return; }
    video.srcObject = stream;
    await video.play();
    camStatus.textContent = 'Arahkan kamera ke QR di lokasi KKM…';
    requestAnimationFrame(tick);
  } catch(err){
    camStatus.textContent = 'Tidak bisa mengakses kamera (' + err.message + '). Gunakan kode manual di bawah.';
  }

  function tick(){
    if(stopped) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = window.jsQR ? jsQR(imageData.data, imageData.width, imageData.height) : null;
      if(code && code.data){ checkToken(code.data); return; }
    }
    requestAnimationFrame(tick);
  }
}

async function finalizeScan(existingRecords){
  const statusEl = document.getElementById('scan_status');
  const btn = document.getElementById('btn_scan');
  btn.disabled = true;
  statusEl.textContent = 'QR terverifikasi. Mengambil lokasi…';
  if(!navigator.geolocation){
    statusEl.textContent = 'Perangkat tidak mendukung geolocation.';
    btn.disabled = false;
    return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const period = getPeriod(state.config);
      if(!period){ statusEl.textContent = 'Waktu absen sudah berakhir.'; btn.disabled = false; return; }
      const dist = haversine(pos.coords.latitude, pos.coords.longitude, state.config.lat, state.config.lng);
      const valid = dist <= state.config.radius;
      const record = {
        date: todayStr(), period, time: nowHMS(),
        lat: pos.coords.latitude, lng: pos.coords.longitude,
        distance: Math.round(dist), valid
      };
      const updated = [...existingRecords, record];
      await sset(attKey(state.currentMember.id), updated);
      showStamp(record);
    },
    err => {
      statusEl.textContent = 'Gagal mengambil lokasi: ' + err.message;
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 12000 }
  );
}

function showStamp(record){
  const overlay = document.createElement('div');
  overlay.className = 'stamp-overlay';
  const label = record.period === 'pagi' ? 'PAGI' : 'SORE';
  overlay.innerHTML = `
    <div class="stamp-card">
      <div class="stamp ${record.valid ? 'ok' : 'bad'}"><span>${record.valid ? 'HADIR' : 'DI LUAR<br>RADIUS'}</span></div>
      <h3 style="font-size:18px;">${record.valid ? 'Absen ' + label + ' Berhasil' : 'Absen ' + label + ' Tercatat'}</h3>
      <p class="small muted mono" style="margin-top:6px;">${record.time} · jarak ${record.distance}m</p>
      ${!record.valid ? '<p class="small" style="margin-top:8px;color:var(--danger);">Anda berada di luar radius ' + state.config.radius + 'm dari titik KKM.</p>' : ''}
      <button class="btn btn-primary" id="btn_close_stamp" style="margin-top:18px;">Tutup</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn_close_stamp').onclick = () => {
    document.body.removeChild(overlay);
    render();
  };
}

/* ---------- ADMIN DASHBOARD ---------- */
function renderAdminDashboard(){
  const wrap = document.createElement('div');
  const topBar = document.createElement('div');
  topBar.style = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;';
  topBar.innerHTML = `<div><div class="eyebrow">Admin</div><h1 style="font-size:20px;">${state.config.name}</h1></div>`;
  const logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn btn-ghost';
  logoutBtn.style = 'width:auto;padding:8px 12px;';
  logoutBtn.textContent = 'Keluar';
  logoutBtn.onclick = () => { state.view = 'landing'; render(); };
  topBar.appendChild(logoutBtn);
  wrap.appendChild(topBar);

  const tabbar = document.createElement('div');
  tabbar.className = 'tabbar';
  const tabs = [['rekap','Rekap'],['anggota','Anggota'],['qr','QR Absen'],['pengaturan','Pengaturan']];
  tabs.forEach(([key,label]) => {
    const t = document.createElement('div');
    t.className = 'tab' + (state.adminSubview === key ? ' active' : '');
    t.textContent = label;
    t.onclick = () => { state.adminSubview = key; render(); };
    tabbar.appendChild(t);
  });
  wrap.appendChild(tabbar);

  const body = document.createElement('div');
  wrap.appendChild(body);
  app.appendChild(wrap);

  if(state.adminSubview === 'rekap') renderRekap(body);
  else if(state.adminSubview === 'anggota') renderAnggota(body);
  else if(state.adminSubview === 'qr') renderQr(body);
  else renderPengaturan(body);
}

async function renderRekap(body){
  body.innerHTML = `<div class="empty">Memuat rekap…</div>`;
  const rows = [];
  for(const m of state.members){
    const recs = (await sget(attKey(m.id))) || [];
    recs.forEach(r => rows.push({ name: m.name, ...r }));
  }
  rows.sort((a,b) => (a.date+a.period < b.date+b.period ? 1 : -1));

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="eyebrow">Rekap Semua Anggota</div>
      <button class="btn btn-outline" id="btn_export" style="width:auto;padding:8px 12px;font-size:12.5px;">⬇ Export CSV</button>
    </div>
  ` + (
    rows.length === 0
      ? `<div class="empty">Belum ada data absensi.</div>`
      : `<div style="overflow-x:auto;"><table><thead><tr><th>Nama</th><th>Tgl</th><th>Periode</th><th>Jam</th><th>Status</th></tr></thead><tbody>` +
        rows.map(r => `<tr>
          <td>${r.name}</td>
          <td class="small">${fmtDate(r.date)}</td>
          <td class="small" style="text-transform:capitalize;">${r.period}</td>
          <td class="mono small">${r.time}</td>
          <td>${statusPill(r)}</td>
        </tr>`).join('') +
        `</tbody></table></div>`
  );
  body.innerHTML = '';
  body.appendChild(card);

  document.getElementById('btn_export').onclick = () => {
    const header = ['Nama','Tanggal','Periode','Jam','Status','Jarak(m)','Latitude','Longitude'];
    const lines = [header.join(',')];
    rows.forEach(r => {
      lines.push([r.name, r.date, r.period, r.time, r.valid ? 'Hadir' : 'Luar Radius', r.distance, r.lat, r.lng].map(escCsv).join(','));
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rekap-absensi-' + todayStr() + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  };
}

function renderAnggota(body){
  body.innerHTML = '';
  const addCard = document.createElement('div');
  addCard.className = 'card';
  addCard.innerHTML = `
    <div class="eyebrow" style="margin-bottom:10px;">Tambah Anggota</div>
    <div class="row">
      <input id="f_new_name" placeholder="Nama anggota" style="flex:1;">
      <button class="btn btn-primary" id="btn_add_member" style="width:auto;padding:11px 16px;">Tambah</button>
    </div>
    <div id="add_member_err"></div>
    ${state.lastCreatedPin ? `<div class="banner banner-green" style="margin-top:10px;">PIN untuk <b>${state.lastCreatedPin.name}</b>: <span class="mono">${state.lastCreatedPin.pin}</span> — sampaikan ke anggota tersebut.</div>` : ''}
  `;
  body.appendChild(addCard);

  const listCard = document.createElement('div');
  listCard.className = 'card';
  listCard.innerHTML = `<div class="eyebrow" style="margin-bottom:6px;">Daftar Anggota (${state.members.length})</div>`;
  if(state.members.length === 0){
    listCard.innerHTML += `<div class="empty">Belum ada anggota.</div>`;
  } else {
    state.members.forEach(m => {
      const row = document.createElement('div');
      row.className = 'member-row';
      row.innerHTML = `<div><div style="font-weight:600;font-size:14px;">${m.name}</div><div class="mono small muted">PIN: ${m.pin}</div></div>`;
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger';
      delBtn.style = 'width:auto;padding:7px 12px;font-size:12.5px;';
      delBtn.textContent = 'Hapus';
      delBtn.onclick = async () => {
        if(!confirm('Hapus ' + m.name + ' dari kelompok? Riwayat absen tetap tersimpan.')) return;
        state.members = state.members.filter(x => x.id !== m.id);
        await sset(K_MEMBERS, state.members);
        render();
      };
      row.appendChild(delBtn);
      listCard.appendChild(row);
    });
  }
  body.appendChild(listCard);

  document.getElementById('btn_add_member').onclick = async () => {
    const name = document.getElementById('f_new_name').value.trim();
    const errEl = document.getElementById('add_member_err');
    if(!name){ errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Nama tidak boleh kosong.</div>'; return; }
    if(state.members.some(m => m.name.toLowerCase() === name.toLowerCase())){
      errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Nama sudah terdaftar.</div>'; return;
    }
    const member = { id: genId(), name, pin: genPin() };
    state.members = [...state.members, member];
    await sset(K_MEMBERS, state.members);
    state.lastCreatedPin = member;
    render();
  };
}

async function renderQr(body){
  body.innerHTML = `<div class="empty">Memuat QR…</div>`;
  let fresh = await sget(K_CONFIG);
  if(!fresh.qrToken || fresh.qrDate !== todayStr()){
    fresh = { ...fresh, qrToken: genQrToken(), qrDate: todayStr() };
    await sset(K_CONFIG, fresh);
  }
  state.config = fresh;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="eyebrow" style="margin-bottom:10px;">QR Absen Hari Ini</div>
    <p class="small muted">Tampilkan atau cetak QR ini di lokasi KKM. Anggota wajib memindai kode ini sebelum absen tercatat. QR otomatis berganti tiap hari.</p>
    <div class="qr-box" id="qr_render"></div>
    <div class="mono small" style="text-align:center;margin-top:10px;color:var(--ink-muted);">Kode manual: <b>${fresh.qrToken}</b></div>
    <button class="btn btn-outline" id="btn_regen_qr" style="margin-top:14px;">Buat Ulang QR (nonaktifkan yang lama)</button>
  `;
  body.innerHTML = '';
  body.appendChild(card);

  new QRCode(document.getElementById('qr_render'), {
    text: fresh.qrToken,
    width: 200,
    height: 200,
    colorDark: '#2B2A22',
    colorLight: '#ffffff',
  });

  document.getElementById('btn_regen_qr').onclick = async () => {
    if(!confirm('QR lama akan langsung tidak berlaku dan anggota harus memindai QR baru. Lanjutkan?')) return;
    const updated = { ...state.config, qrToken: genQrToken(), qrDate: todayStr() };
    await sset(K_CONFIG, updated);
    state.config = updated;
    renderQr(body);
  };
}

function renderPengaturan(body){
  body.innerHTML = '';
  const c = state.config;
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>Nama Kelompok</label><input id="f_name" value="${c.name}"></div>
    <div class="field"><label>PIN Admin</label><input id="f_adminpin" value="${c.adminPin}"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Pagi</label><input id="f_ms" type="time" value="${c.morningStart}"></div>
      <div class="field" style="flex:1;"><label>Selesai Pagi</label><input id="f_me" type="time" value="${c.morningEnd}"></div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Sore</label><input id="f_es" type="time" value="${c.eveningStart}"></div>
      <div class="field" style="flex:1;"><label>Selesai Sore</label><input id="f_ee" type="time" value="${c.eveningEnd}"></div>
    </div>
    <div class="field">
      <label>Titik Lokasi KKM</label>
      <button class="btn btn-outline" id="btn_locate" type="button">📍 Perbarui dengan Lokasi Saat Ini</button>
      <div id="loc_status" class="small muted" style="margin-top:8px;"></div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label class="mono">Latitude</label><input id="f_lat" value="${c.lat}"></div>
      <div class="field" style="flex:1;"><label class="mono">Longitude</label><input id="f_lng" value="${c.lng}"></div>
    </div>
    <div class="field"><label>Radius Toleransi (meter)</label><input id="f_radius" type="number" value="${c.radius}"></div>
    <div id="save_status"></div>
    <button class="btn btn-primary" id="btn_save">Simpan Perubahan</button>
  `;
  body.appendChild(card);

  document.getElementById('btn_locate').onclick = () => {
    const statusEl = document.getElementById('loc_status');
    statusEl.textContent = 'Mengambil lokasi…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('f_lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('f_lng').value = pos.coords.longitude.toFixed(6);
        statusEl.textContent = 'Lokasi diperbarui (akurasi ~' + Math.round(pos.coords.accuracy) + 'm). Jangan lupa Simpan.';
      },
      err => { statusEl.textContent = 'Gagal: ' + err.message; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  };

  document.getElementById('btn_save').onclick = async () => {
    const newConfig = {
      name: document.getElementById('f_name').value.trim(),
      adminPin: document.getElementById('f_adminpin').value.trim(),
      morningStart: document.getElementById('f_ms').value,
      morningEnd: document.getElementById('f_me').value,
      eveningStart: document.getElementById('f_es').value,
      eveningEnd: document.getElementById('f_ee').value,
      lat: parseFloat(document.getElementById('f_lat').value),
      lng: parseFloat(document.getElementById('f_lng').value),
      radius: parseInt(document.getElementById('f_radius').value, 10),
    };
    await sset(K_CONFIG, newConfig);
    state.config = newConfig;
    document.getElementById('save_status').innerHTML = '<div class="banner banner-green">Pengaturan tersimpan.</div>';
  };
}

boot();
</script>
