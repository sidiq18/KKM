<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi KKM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#F3EFE4;
    --surface:#FFFFFF;
    --surface-alt:#EAE3D2;
    --ink:#2B2A22;
    --ink-muted:#786F58;
    --accent-green:#3F6B4E;
    --accent-green-light:#E4EEE3;
    --accent-clay:#C1703D;
    --accent-clay-light:#F5E4D3;
    --danger:#B24435;
    --danger-light:#F6E1DC;
    --border:#DAD2BC;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding:20px 18px 60px;}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);}
  .top{margin-bottom:22px;}
  .top h1{font-size:22px;font-weight:800;line-height:1.2;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer;transition:transform .08s ease, opacity .15s ease;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent-green);color:#fff;}
  .btn-primary:hover{opacity:.92;}
  .btn-clay{background:var(--accent-clay);color:#fff;}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
  .btn-danger{background:var(--danger-light);color:var(--danger);}
  .btn-ghost{background:transparent;color:var(--ink-muted);font-weight:500;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-muted);margin-bottom:6px;}
  input,select{width:100%;padding:11px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-family:'Inter',sans-serif;font-size:14.5px;color:var(--ink);}
  input:focus,select:focus{outline:2px solid var(--accent-green);outline-offset:1px;}
  .field{margin-bottom:12px;}
  .pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .pill-green{background:var(--accent-green-light);color:var(--accent-green);}
  .pill-clay{background:var(--accent-clay-light);color:var(--accent-clay);}
  .pill-danger{background:var(--danger-light);color:var(--danger);}
  .pill-muted{background:var(--surface-alt);color:var(--ink-muted);}
  .tabbar{display:flex;background:var(--surface-alt);border-radius:11px;padding:4px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-muted);}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .role-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;text-align:left;cursor:pointer;width:100%;}
  .role-btn:hover{border-color:var(--accent-green);}
  .role-btn .eyebrow{margin-bottom:6px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);padding:6px 8px;border-bottom:1.5px solid var(--border);font-family:'JetBrains Mono',monospace;}
  td{padding:9px 8px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  .muted{color:var(--ink-muted);}
  .small{font-size:12.5px;}
  .member-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .member-row:last-child{border-bottom:none;}
  .back-link{display:inline-flex;align-items:center;gap:4px;color:var(--ink-muted);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;}
  .stamp-overlay{position:fixed;inset:0;background:rgba(43,42,34,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .stamp-card{background:var(--surface);border-radius:18px;padding:32px 24px;max-width:340px;width:100%;text-align:center;animation:popIn .28s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
  .stamp{width:120px;height:120px;border-radius:50%;border:3px dashed currentColor;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;transform:rotate(-8deg);}
  .stamp span{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;letter-spacing:.03em;}
  .stamp.ok{color:var(--accent-green);}
  .stamp.bad{color:var(--danger);}
  .period-card{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:11px;background:var(--surface-alt);margin-bottom:10px;}
  .period-card .label{font-weight:700;font-size:14px;}
  .banner{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;}
  .banner-danger{background:var(--danger-light);color:var(--danger);}
  .banner-green{background:var(--accent-green-light);color:var(--accent-green);}
  .empty{text-align:center;padding:30px 10px;color:var(--ink-muted);font-size:13.5px;}
  .footer-note{text-align:center;font-size:11.5px;color:var(--ink-muted);margin-top:24px;font-family:'JetBrains Mono',monospace;}
  .qr-box{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:12px;border:1px solid var(--border);margin-top:6px;}
  .qr-video-wrap{width:100%;aspect-ratio:1/1;background:#111;border-radius:12px;overflow:hidden;}
  #qr_video{width:100%;height:100%;object-fit:cover;display:block;}
  ::selection{background:var(--accent-green-light);}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- FIREBASE SETUP ----------
   Isi konfigurasi project Firebase kamu di sini.
   Cara dapatnya: console.firebase.google.com -> buat project -> Project settings
   -> scroll ke "Your apps" -> tambah Web App (</>) -> copy config di bawah ini.
   Jangan lupa aktifkan Firestore Database (Build > Firestore Database > Create database).
*/
const firebaseConfig = {
  apiKey: "AIzaSyDyk9VP55b1StxDCfcss5SbWE0Yz6nIWeM",
  authDomain: "absensi-kkm.firebaseapp.com",
  projectId: "absensi-kkm",
  storageBucket: "absensi-kkm.firebasestorage.app",
  messagingSenderId: "513660198819",
  appId: "1:513660198819:web:0e5556346cd30cc6438416"
};
let db = null;
function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

/* ---------- storage helpers (Firestore-backed, same key/value shape as before) ---------- */
const K_CONFIG = 'kkm_config';
const K_MEMBERS = 'kkm_members';
const K_PERMITS = 'kkm_permits';
const attKey = (id) => 'kkm_attendance_' + id;

/* ---------- session persistence (biar refresh tidak logout) ---------- */
const SESSION_KEY = 'kkm_session';
function saveSession(session){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch(e){ console.error('gagal simpan sesi', e); }
}
function loadSession(){
  try{ const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); } catch(e){}
}

async function sget(key){
  try{
    const snap = await db.collection('kv').doc(key).get();
    return snap.exists ? JSON.parse(snap.data().value) : null;
  } catch(e){ console.error('firestore get failed', e); return null; }
}
async function sset(key, value){
  try{
    await db.collection('kv').doc(key).set({ value: JSON.stringify(value) });
    return true;
  } catch(e){ console.error('firestore set failed', e); return null; }
}

/* ---------- utils ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }
function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function nowHM(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function nowHMS(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function genId(){ return 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function genPin(){ return String(Math.floor(1000 + Math.random()*9000)); }
function genQrToken(){
  return Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
}
/* Pastikan token QR hari ini sudah ada, tanpa perlu admin membuka tab "QR Absen" secara manual. */
async function ensureTodayQrToken(){
  const fresh = (await sget(K_CONFIG)) || {};
  if(!fresh.qrToken || fresh.qrDate !== todayStr()){
    const updated = { ...fresh, qrToken: genQrToken(), qrDate: todayStr() };
    await sset(K_CONFIG, updated);
    if(state.config) state.config = { ...state.config, ...updated };
    return updated;
  }
  return fresh;
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return d + ' ' + bulan[parseInt(m,10)-1] + ' ' + y;
}
function haversine(lat1,lng1,lat2,lng2){
  const R = 6371000;
  const toRad = x => x * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getPeriodStatus(config, hm){
  hm = hm || nowHM();
  // fallback ke *End kalau config lama belum punya field *LateEnd, biar tidak error
  const mLateEnd = config.morningLateEnd || config.morningEnd;
  const eLateEnd = config.eveningLateEnd || config.eveningEnd;
  if(hm >= config.morningStart && hm <= config.morningEnd) return { period: 'pagi', status: 'ontime' };
  if(hm > config.morningEnd && hm <= mLateEnd) return { period: 'pagi', status: 'late' };
  if(hm >= config.eveningStart && hm <= config.eveningEnd) return { period: 'sore', status: 'ontime' };
  if(hm > config.eveningEnd && hm <= eLateEnd) return { period: 'sore', status: 'late' };
  return { period: null, status: null };
}
function findApprovedIzin(permits, memberId, date, period){
  return (permits || []).find(p =>
    p.memberId === memberId && p.date === date && p.status === 'disetujui' &&
    (p.period === 'sehari' || p.period === period)
  );
}
function escCsv(v){
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}

/* ---------- state ---------- */
let state = {
  view: 'loading',
  config: null,
  members: [],
  adminSubview: 'rekap',
  rekapView: 'kesimpulan', // 'kesimpulan' | 'detail'
  currentMember: null,
  errorMsg: null,
  busy: false,
  addMemberError: null,
  lastCreatedPin: null,
  rekapExpanded: null,
  editLocationMsg: null,
};

const app = document.getElementById('app');

async function boot(){
  if(firebaseConfig.apiKey === 'ISI_API_KEY_DISINI'){
    app.innerHTML = `
      <div class="card">
        <h3 style="font-size:16px;margin-bottom:8px;">Firebase belum dikonfigurasi</h3>
        <p class="small muted">Buka file HTML ini, isi objek <code>firebaseConfig</code> di bagian atas &lt;script&gt; dengan konfigurasi project Firebase kamu, lalu simpan dan muat ulang halaman.</p>
      </div>`;
    return;
  }
  initFirebase();
  state.config = await sget(K_CONFIG);
  state.members = (await sget(K_MEMBERS)) || [];
  if(state.config){
    ensureTodayQrToken(); // fire-and-forget, tidak menunda render halaman
  }

  const session = loadSession();
  if(session && session.role === 'admin' && state.config){
    state.view = 'adminDashboard';
    state.adminSubview = 'rekap';
  } else if(session && session.role === 'member'){
    const m = state.members.find(x => x.id === session.memberId);
    if(m){
      state.currentMember = m;
      state.view = 'memberDashboard';
    } else {
      clearSession();
      state.view = 'landing';
    }
  } else {
    state.view = 'landing';
  }
  render();
}

/* ---------- render dispatcher ---------- */
function render(){
  app.innerHTML = '';
  if(state.view === 'loading') app.innerHTML = '<div class="empty">Memuat…</div>';
  else if(state.view === 'landing') renderLanding();
  else if(state.view === 'adminSetup') renderAdminSetup();
  else if(state.view === 'adminLogin') renderAdminLogin();
  else if(state.view === 'memberLogin') renderMemberLogin();
  else if(state.view === 'memberNoConfig') renderMemberNoConfig();
  else if(state.view === 'adminDashboard') renderAdminDashboard();
  else if(state.view === 'memberDashboard') renderMemberDashboard();
}

function backLink(label, toView){
  const a = document.createElement('div');
  a.className = 'back-link';
  a.textContent = '\u2190 ' + label;
  a.onclick = () => { state.view = toView; state.errorMsg=null; render(); };
  return a;
}

/* ---------- LANDING ---------- */
function renderLanding(){
  const wrap = document.createElement('div');
  const title = state.config ? state.config.name : 'Absensi Kelompok';
  wrap.innerHTML = `
    <div class="top">
      <div class="eyebrow">Absensi Lapangan</div>
      <h1>${title}</h1>
      <p class="small muted" style="margin-top:6px;">Absen pagi &amp; sore, dengan verifikasi lokasi.</p>
    </div>
  `;
  const roleWrap = document.createElement('div');
  roleWrap.className = 'stack';

  const memberBtn = document.createElement('button');
  memberBtn.className = 'role-btn';
  memberBtn.innerHTML = `<div class="eyebrow">Anggota</div><h3 style="font-size:17px;">Absen Sekarang</h3><div class="small muted" style="margin-top:4px;">Login dengan nama &amp; PIN</div>`;
  memberBtn.onclick = () => {
    if(!state.config || state.members.length === 0){ state.view = 'memberNoConfig'; }
    else state.view = 'memberLogin';
    render();
  };

  const adminBtn = document.createElement('button');
  adminBtn.className = 'role-btn';
  adminBtn.innerHTML = `<div class="eyebrow">Ketua Kelompok</div><h3 style="font-size:17px;">Kelola &amp; Rekap</h3><div class="small muted" style="margin-top:4px;">${state.config ? 'Login admin' : 'Setup pertama kali'}</div>`;
  adminBtn.onclick = () => {
    state.view = state.config ? 'adminLogin' : 'adminSetup';
    render();
  };

  roleWrap.appendChild(memberBtn);
  roleWrap.appendChild(adminBtn);
  wrap.appendChild(roleWrap);
  wrap.appendChild(elFooter());
  app.appendChild(wrap);
}

function elFooter(){
  const f = document.createElement('div');
  f.className = 'footer-note';
  f.textContent = 'DATA TERSIMPAN &amp; DAPAT DILIHAT SELURUH ANGGOTA KELOMPOK'.replace('&amp;','&');
  return f;
}

/* ---------- MEMBER: no config yet ---------- */
function renderMemberNoConfig(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3 style="font-size:16px;margin-bottom:8px;">Belum ada data</h3>
    <p class="small muted">Kelompok ini belum diatur. Minta ketua kelompok untuk melakukan setup awal dan menambahkan nama Anda sebagai anggota.</p>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);
}

/* ---------- ADMIN SETUP (first time) ---------- */
function renderAdminSetup(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  const topEl = document.createElement('div');
  topEl.className = 'top';
  topEl.innerHTML = `<div class="eyebrow">Setup Awal</div><h1>Atur Kelompok</h1>`;
  wrap.appendChild(topEl);
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>Nama Kelompok</label><input id="f_name" placeholder="KKM 33 Sukalaksana"></div>
    <div class="field"><label>Buat PIN Admin (untuk Anda, ketua kelompok)</label><input id="f_adminpin" placeholder="mis. 190400" inputmode="numeric"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Absen Pagi</label><input id="f_ms" type="time" value="06:00"></div>
      <div class="field" style="flex:1;"><label>Selesai Tepat Waktu Pagi</label><input id="f_me" type="time" value="08:00"></div>
    </div>
    <div class="field"><label>Batas Akhir Telat Pagi (lewat ini dianggap tidak hadir)</label><input id="f_mle" type="time" value="12:00"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Absen Sore</label><input id="f_es" type="time" value="15:00"></div>
      <div class="field" style="flex:1;"><label>Selesai Tepat Waktu Sore</label><input id="f_ee" type="time" value="17:00"></div>
    </div>
    <div class="field"><label>Batas Akhir Telat Sore (lewat ini dianggap tidak hadir)</label><input id="f_ele" type="time" value="19:00"></div>
    <div class="field">
      <label>Titik Lokasi KKM</label>
      <button class="btn btn-outline" id="btn_locate" type="button">📍 Gunakan Lokasi Saat Ini</button>
      <div id="loc_status" class="small muted" style="margin-top:8px;">Berdiri di lokasi KKM, lalu tekan tombol di atas.</div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label class="mono">Latitude</label><input id="f_lat" placeholder="-6.xxxxx"></div>
      <div class="field" style="flex:1;"><label class="mono">Longitude</label><input id="f_lng" placeholder="106.xxxxx"></div>
    </div>
    <div class="field"><label>Radius Toleransi (meter)</label><input id="f_radius" type="number" value="100" inputmode="numeric"></div>
    <div id="setup_err"></div>
    <button class="btn btn-primary" id="btn_save_setup">Simpan &amp; Masuk sebagai Admin</button>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);

  document.getElementById('btn_locate').onclick = () => {
    const statusEl = document.getElementById('loc_status');
    statusEl.textContent = 'Mengambil lokasi…';
    if(!navigator.geolocation){ statusEl.textContent = 'Perangkat tidak mendukung geolocation.'; return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('f_lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('f_lng').value = pos.coords.longitude.toFixed(6);
        statusEl.textContent = 'Lokasi berhasil diambil (akurasi ~' + Math.round(pos.coords.accuracy) + 'm).';
      },
      err => { statusEl.textContent = 'Gagal mengambil lokasi: ' + err.message + '. Anda bisa isi manual.'; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  };

  document.getElementById('btn_save_setup').onclick = async () => {
    const name = document.getElementById('f_name').value.trim();
    const adminPin = document.getElementById('f_adminpin').value.trim();
    const ms = document.getElementById('f_ms').value, me = document.getElementById('f_me').value;
    const mle = document.getElementById('f_mle').value;
    const es = document.getElementById('f_es').value, ee = document.getElementById('f_ee').value;
    const ele = document.getElementById('f_ele').value;
    const lat = parseFloat(document.getElementById('f_lat').value);
    const lng = parseFloat(document.getElementById('f_lng').value);
    const radius = parseInt(document.getElementById('f_radius').value, 10);
    const errEl = document.getElementById('setup_err');
    if(!name || !adminPin || !ms || !me || !mle || !es || !ee || !ele || isNaN(lat) || isNaN(lng) || isNaN(radius)){
      errEl.innerHTML = '<div class="banner banner-danger">Lengkapi semua data, termasuk lokasi.</div>';
      return;
    }
    const config = { name, adminPin, morningStart: ms, morningEnd: me, morningLateEnd: mle, eveningStart: es, eveningEnd: ee, eveningLateEnd: ele, lat, lng, radius };
    await sset(K_CONFIG, config);
    state.config = config;
    ensureTodayQrToken(); // siapkan QR hari ini langsung, tidak perlu buka tab QR dulu
    saveSession({ role: 'admin' });
    state.view = 'adminDashboard';
    state.adminSubview = 'anggota';
    render();
  };
}

/* ---------- ADMIN LOGIN ---------- */
function renderAdminLogin(){
  const wrap = document.createElement('div');
  wrap.appendChild(backLink('Kembali', 'landing'));
  const topEl = document.createElement('div');
  topEl.className = 'top';
  topEl.innerHTML = `<div class="eyebrow">Ketua Kelompok</div><h1>Login Admin</h1>`;
  wrap.appendChild(topEl);
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>PIN Admin</label><input id="f_pin" type="password" inputmode="numeric" placeholder="••••••"></div>
    <div id="login_err"></div>
    <button class="btn btn-primary" id="btn_login">Masuk</button>
  `;
  wrap.appendChild(card);
  app.appendChild(wrap);
  document.getElementById('btn_login').onclick = () => {
    const pin = document.getElementById('f_pin').value.trim();
    if(pin === state.config.adminPin){
      saveSession({ role: 'admin' });
      state.view = 'adminDashboard';
      state.adminSubview = 'rekap';
      render();
    } else {
      document.getElementById('login_err').innerHTML = '<div class="banner banner-danger">PIN salah.</div>';
    }
  };
}

/* ---------- MEMBER LOGIN ---------- */

function izinStatusPill(p){
  if(p.status === 'disetujui') return `<span class="pill pill-green">Disetujui</span>`;
  if(p.status === 'ditolak') return `<span class="pill pill-danger">Ditolak</span>`;
  return `<span class="pill pill-muted">Menunggu</span>`;
}

function periodCardHtml(period, todayRecs, config, approvedIzin){
  const rec = todayRecs.find(r => r.period === period);
  const label = period === 'pagi' ? 'Pagi' : 'Sore';
  const start = period === 'pagi' ? config.morningStart : config.eveningStart;
  const end = period === 'pagi' ? config.morningEnd : config.eveningEnd;
  const lateEnd = (period === 'pagi' ? config.morningLateEnd : config.eveningLateEnd) || end;
  const window = `${start}–${end}` + (lateEnd !== end ? ` <span class="muted">(telat s.d ${lateEnd})</span>` : '');
  let right;
  if(rec) right = statusPill(rec) + ` <span class="mono small muted">${rec.time}</span>`;
  else if(approvedIzin) right = `<span class="pill pill-muted">Izin</span>`;
  else right = `<span class="pill pill-muted">${window}</span>`;
  return `<div class="period-card"><div class="label">${label}</div><div>${right}</div></div>`;
}

function statusPill(rec){
  if(!rec.valid) return `<span class="pill pill-danger">Luar Radius</span>`;
  if(rec.late) return `<span class="pill pill-clay">Telat</span>`;
  return `<span class="pill pill-green">Hadir</span>`;
}

/* ---------- kesimpulan harian (gabungan pagi + sore) ---------- */
function sessionStatus(rec, hasIzin){
  if(rec) return !rec.valid ? 'invalid' : (rec.late ? 'late' : 'ontime');
  return hasIzin ? 'izin' : null;
}

function dailySummaryLabel(pStatus, sStatus){
  if(pStatus === 'invalid' || sStatus === 'invalid') return { text: 'Luar Radius', pill: 'pill-danger' };
  if(pStatus === 'izin' && sStatus === 'izin') return { text: 'Izin (Sehari Penuh)', pill: 'pill-muted' };
  if(pStatus === 'izin' && sStatus === 'ontime') return { text: 'Hadir (Izin Pagi)', pill: 'pill-green' };
  if(pStatus === 'izin' && sStatus === 'late') return { text: 'Hadir Kesorean (Izin Pagi)', pill: 'pill-clay' };
  if(pStatus === 'izin' && !sStatus) return { text: 'Izin Pagi', pill: 'pill-muted' };
  if(sStatus === 'izin' && pStatus === 'ontime') return { text: 'Hadir (Izin Sore)', pill: 'pill-green' };
  if(sStatus === 'izin' && pStatus === 'late') return { text: 'Hadir tapi Telat (Izin Sore)', pill: 'pill-clay' };
  if(sStatus === 'izin' && !pStatus) return { text: 'Izin Sore', pill: 'pill-muted' };
  if(pStatus === 'ontime' && sStatus === 'ontime') return { text: 'Hadir', pill: 'pill-green' };
  if(pStatus === 'late' && sStatus === 'ontime') return { text: 'Hadir tapi Telat', pill: 'pill-clay' };
  if(pStatus === 'ontime' && sStatus === 'late') return { text: 'Hadir Kesorean', pill: 'pill-clay' };
  if(pStatus === 'late' && sStatus === 'late') return { text: 'Hadir tapi Telat (Pagi &amp; Sore)', pill: 'pill-clay' };
  if(pStatus && !sStatus) return { text: 'Hanya Absen Pagi' + (pStatus === 'late' ? ' (Telat)' : ''), pill: 'pill-muted' };
  if(sStatus && !pStatus) return { text: 'Hanya Absen Sore' + (sStatus === 'late' ? ' (Telat)' : ''), pill: 'pill-muted' };
  return { text: '-', pill: 'pill-muted' };
}

function sesiSubtext(rec, hasIzin, label){
  if(rec) return `${label}: ${!rec.valid ? 'Luar Radius' : (rec.late ? 'Telat' : 'Hadir')} <span class="mono">${rec.time}</span>`;
  if(hasIzin) return `${label}: Izin`;
  return `${label}: -`;
}

async function openQrScanner(onValidToken){
  const overlay = document.createElement('div');
  overlay.className = 'stamp-overlay';
  overlay.innerHTML = `
    <div class="stamp-card" style="max-width:340px;">
      <div class="eyebrow" style="margin-bottom:8px;">Pindai QR Absen</div>
      <div class="qr-video-wrap"><video id="qr_video" playsinline autoplay muted></video></div>
      <div id="qr_cam_status" class="small muted" style="margin-top:10px;">Mengaktifkan kamera…</div>
      <div style="margin-top:14px;text-align:left;">
        <label>Atau upload gambar QR</label>
        <input id="qr_file" type="file" accept="image/*" style="width:100%;padding:9px 10px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;">
        <div id="qr_file_status" class="small muted" style="margin-top:6px;"></div>
      </div>
      <div style="margin-top:14px;text-align:left;">
        <label>Atau masukkan kode manual</label>
        <div class="row">
          <input id="qr_manual" placeholder="KODE-QR" style="flex:1;text-transform:uppercase;">
          <button class="btn btn-outline" id="btn_qr_manual" style="width:auto;padding:11px 14px;">Cek</button>
        </div>
      </div>
      <div id="qr_err"></div>
      <button class="btn btn-ghost" id="btn_qr_cancel" style="margin-top:8px;">Batal</button>
    </div>
  `;
  document.body.appendChild(overlay);

  let stream = null;
  let stopped = false;
  const video = document.getElementById('qr_video');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const camStatus = document.getElementById('qr_cam_status');

  function cleanup(){
    stopped = true;
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(overlay.parentNode) document.body.removeChild(overlay);
  }
  document.getElementById('btn_qr_cancel').onclick = cleanup;

  async function checkToken(value){
    const errEl = document.getElementById('qr_err');
    const fresh = await sget(K_CONFIG);
    const val = (value || '').trim().toUpperCase();
    if(!fresh){
      if(errEl) errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Gagal mengambil data konfigurasi dari server. Cek koneksi internet lalu coba lagi.</div>';
      return;
    }
    if(!fresh.qrToken){
      if(errEl) errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Admin belum membuat QR absen hari ini. Minta admin buka tab "QR Absen".</div>';
      return;
    }
    if(val === fresh.qrToken.toUpperCase()){
      cleanup();
      onValidToken();
    } else if(errEl){
      errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Kode QR tidak valid atau sudah kadaluarsa. Minta admin tampilkan QR terbaru.</div>';
    }
  }
  document.getElementById('btn_qr_manual').onclick = () => checkToken(document.getElementById('qr_manual').value);

  const fileInput = document.getElementById('qr_file');
  const fileStatus = document.getElementById('qr_file_status');
  fileInput.onchange = () => {
    const file = fileInput.files && fileInput.files[0];
    if(!file) return;
    fileStatus.textContent = 'Membaca gambar…';
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        if(!window.jsQR){
          fileStatus.textContent = 'Pembaca QR belum siap, coba lagi sebentar lagi.';
          return;
        }
        const fc = document.createElement('canvas');
        const fctx = fc.getContext('2d');
        // batasi ukuran biar tidak berat kalau foto resolusinya besar
        const scale = Math.min(1, 1600 / Math.max(img.width, img.height));
        fc.width = Math.round(img.width * scale);
        fc.height = Math.round(img.height * scale);
        fctx.drawImage(img, 0, 0, fc.width, fc.height);
        const imageData = fctx.getImageData(0, 0, fc.width, fc.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
        if(code && code.data){
          fileStatus.textContent = 'QR terbaca dari gambar. Memeriksa…';
          checkToken(code.data);
        } else {
          fileStatus.textContent = 'QR tidak terbaca dari gambar ini. Coba foto yang lebih jelas/tidak buram, atau gunakan kode manual.';
        }
      };
      img.onerror = () => { fileStatus.textContent = 'Gagal memuat gambar. Coba file lain.'; };
      img.src = reader.result;
    };
    reader.onerror = () => { fileStatus.textContent = 'Gagal membaca file.'; };
    reader.readAsDataURL(file);
  };

  if(location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'){
    camStatus.textContent = 'Kamera hanya bisa diakses lewat HTTPS (halaman ini dibuka lewat koneksi tidak aman). Gunakan kode manual di bawah, atau minta admin hosting halaman ini via HTTPS.';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    camStatus.textContent = 'Kamera tidak tersedia di perangkat/browser ini. Gunakan kode manual di bawah.';
    return;
  }

  async function startCamera(constraints){
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    if(stopped){ stream.getTracks().forEach(t => t.stop()); return; }
    video.srcObject = stream;
    video.muted = true;
    video.playsInline = true;
    const tryPlay = () => { video.play().catch(()=>{}); };
    video.onloadedmetadata = tryPlay;
    video.oncanplay = tryPlay;
    tryPlay();
    // jaga-jaga: beberapa browser mobile butuh dorongan play() ulang setelah stream benar-benar siap
    setTimeout(tryPlay, 300);
    setTimeout(tryPlay, 1000);
    camStatus.textContent = 'Arahkan kamera ke QR di lokasi KKM…';
    requestAnimationFrame(tick);
  }

  try{
    await startCamera({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 960 },
        height: { ideal: 960 }
      }
    });
  } catch(err){
    // fallback: coba constraint kamera paling sederhana (mis. laptop tanpa kamera belakang, atau constraint spesifik ditolak)
    try{
      camStatus.textContent = 'Mencoba mode kamera lain…';
      await startCamera({ video: true });
    } catch(err2){
      if(err2.name === 'NotAllowedError' || err.name === 'NotAllowedError'){
        camStatus.textContent = 'Izin kamera ditolak. Aktifkan izin kamera untuk situs ini di pengaturan browser, atau gunakan kode manual di bawah.';
      } else if(err2.name === 'NotFoundError' || err.name === 'NotFoundError'){
        camStatus.textContent = 'Tidak ada kamera terdeteksi di perangkat ini. Gunakan kode manual di bawah.';
      } else {
        camStatus.textContent = 'Tidak bisa mengakses kamera (' + err2.message + '). Gunakan kode manual di bawah.';
      }
    }
  }

  const SCAN_MAX_SIDE = 480; // downscale sebelum diproses jsQR biar lebih cepat & lebih sensitif
  let lastScanAt = 0;

  function tick(now){
    if(stopped) return;
    if(video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth > 0 && video.videoHeight > 0){
      if(!lastScanAt || (now - lastScanAt) >= 80){ // throttle ~12x/detik, cukup untuk QR statis
        lastScanAt = now;
        const vw = video.videoWidth, vh = video.videoHeight;
        const scale = Math.min(1, SCAN_MAX_SIDE / Math.max(vw, vh));
        canvas.width = Math.round(vw * scale);
        canvas.height = Math.round(vh * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR
          ? jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' })
          : null;
        if(code && code.data){ checkToken(code.data); return; }
      }
    }
    requestAnimationFrame(tick);
  }
}

async function finalizeScan(existingRecords){
  const statusEl = document.getElementById('scan_status');
  const btn = document.getElementById('btn_scan');
  btn.disabled = true;
  statusEl.textContent = 'QR terverifikasi. Mengambil lokasi…';
  if(!navigator.geolocation){
    statusEl.textContent = 'Perangkat tidak mendukung geolocation.';
    btn.disabled = false;
    return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { period, status: periodStatus } = getPeriodStatus(state.config);
      if(!period){ statusEl.textContent = 'Waktu absen sudah berakhir.'; btn.disabled = false; return; }
      const dist = haversine(pos.coords.latitude, pos.coords.longitude, state.config.lat, state.config.lng);
      const valid = dist <= state.config.radius;
      const record = {
        date: todayStr(), period, time: nowHMS(),
        lat: pos.coords.latitude, lng: pos.coords.longitude,
        distance: Math.round(dist), valid,
        late: periodStatus === 'late'
      };
      const updated = [...existingRecords, record];
      await sset(attKey(state.currentMember.id), updated);
      showStamp(record);
    },
    err => {
      statusEl.textContent = 'Gagal mengambil lokasi: ' + err.message;
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 12000 }
  );
}

function showStamp(record){
  const overlay = document.createElement('div');
  overlay.className = 'stamp-overlay';
  const label = record.period === 'pagi' ? 'PAGI' : 'SORE';
  const stampWord = !record.valid ? 'DI LUAR<br>RADIUS' : (record.late ? 'HADIR<br>(TELAT)' : 'HADIR');
  const titleWord = !record.valid ? 'Absen ' + label + ' Tercatat' : (record.late ? 'Absen ' + label + ' Tercatat (Telat)' : 'Absen ' + label + ' Berhasil');
  overlay.innerHTML = `
    <div class="stamp-card">
      <div class="stamp ${record.valid ? (record.late ? 'bad' : 'ok') : 'bad'}"><span>${stampWord}</span></div>
      <h3 style="font-size:18px;">${titleWord}</h3>
      <p class="small muted mono" style="margin-top:6px;">${record.time} · jarak ${record.distance}m</p>
      ${!record.valid ? '<p class="small" style="margin-top:8px;color:var(--danger);">Anda berada di luar radius ' + state.config.radius + 'm dari titik KKM.</p>' : ''}
      ${record.valid && record.late ? '<p class="small" style="margin-top:8px;color:var(--accent-clay);">Absen tercatat, tapi di luar jam tepat waktu.</p>' : ''}
      <button class="btn btn-primary" id="btn_close_stamp" style="margin-top:18px;">Tutup</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn_close_stamp').onclick = () => {
    document.body.removeChild(overlay);
    render();
  };
}

    const t = document.createElement('div');
    t.className = 'tab' + (state.adminSubview === key ? ' active' : '');
    t.textContent = label;
    t.onclick = () => { state.adminSubview = key; render(); };
    tabbar.appendChild(t);
  });
  wrap.appendChild(tabbar);

  const body = document.createElement('div');
  wrap.appendChild(body);
  app.appendChild(wrap);

  if(state.adminSubview === 'rekap') renderRekap(body);
  else if(state.adminSubview === 'izin') renderIzinAdmin(body);
  else if(state.adminSubview === 'anggota') renderAnggota(body);
  else if(state.adminSubview === 'qr') renderQr(body);
  else renderPengaturan(body);
}

async function renderRekap(body){
  body.innerHTML = `<div class="empty">Memuat rekap…</div>`;
  const permits = (await sget(K_PERMITS)) || [];
  const approvedIzin = permits.filter(p => p.status === 'disetujui');

  const rows = [];
  for(const m of state.members){
    const recs = (await sget(attKey(m.id))) || [];
    recs.forEach(r => {
      const flagged = !!findApprovedIzin(approvedIzin, m.id, r.date, r.period);
      rows.push({ name: m.name, memberId: m.id, ...r, joki: flagged });
    });
  }
  rows.sort((a,b) => (a.date+a.period < b.date+b.period ? 1 : -1));

  body.innerHTML = '';

  const subTab = document.createElement('div');
  subTab.className = 'tabbar';
  subTab.style = 'margin-bottom:12px;';
  [['kesimpulan','Kesimpulan Harian'],['detail','Detail Per Sesi']].forEach(([key,label]) => {
    const t = document.createElement('div');
    t.className = 'tab' + (state.rekapView === key ? ' active' : '');
    t.textContent = label;
    t.onclick = () => { state.rekapView = key; renderRekap(body); };
    subTab.appendChild(t);
  });
  body.appendChild(subTab);

  if(state.rekapView === 'kesimpulan') renderRekapKesimpulan(body, rows, approvedIzin);
  else renderRekapDetail(body, rows);
}

function renderRekapDetail(body, rows){
  const flaggedCount = rows.filter(r => r.joki).length;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="eyebrow">Detail Per Sesi</div>
      <button class="btn btn-outline" id="btn_export" style="width:auto;padding:8px 12px;font-size:12.5px;">⬇ Export CSV</button>
    </div>
    ${flaggedCount > 0 ? `<div class="banner banner-danger">⚠ Ada ${flaggedCount} absen yang tercatat meski izin sudah disetujui di tanggal &amp; sesi yang sama — cek kemungkinan joki di baris bertanda ⚠ di bawah.</div>` : ''}
  ` + (
    rows.length === 0
      ? `<div class="empty">Belum ada data absensi.</div>`
      : `<div style="overflow-x:auto;"><table><thead><tr><th>Nama</th><th>Tgl</th><th>Periode</th><th>Jam</th><th>Status</th></tr></thead><tbody>` +
        rows.map(r => `<tr style="${r.joki ? 'background:var(--danger-light);' : ''}">
          <td>${r.name}</td>
          <td class="small">${fmtDate(r.date)}</td>
          <td class="small" style="text-transform:capitalize;">${r.period}</td>
          <td class="mono small">${r.time}</td>
          <td>${statusPill(r)}${r.joki ? ' <span class="pill pill-danger" title="Ada izin disetujui di tanggal & sesi yang sama">⚠ CURIGA</span>' : ''}</td>
        </tr>`).join('') +
        `</tbody></table></div>`
  );
  body.appendChild(card);

  document.getElementById('btn_export').onclick = () => {
    const header = ['Nama','Tanggal','Periode','Jam','Status','Jarak(m)','Latitude','Longitude','IndikasiJoki'];
    const lines = [header.join(',')];
    rows.forEach(r => {
      const status = !r.valid ? 'Luar Radius' : (r.late ? 'Telat' : 'Hadir');
      lines.push([r.name, r.date, r.period, r.time, status, r.distance, r.lat, r.lng, r.joki ? 'YA' : ''].map(escCsv).join(','));
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rekap-detail-' + todayStr() + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  };
}

function renderRekapKesimpulan(body, rows, approvedIzin){
  // gabungkan pagi + sore per anggota per tanggal jadi satu kesimpulan kehadiran harian
  const byKey = {};
  rows.forEach(r => {
    const key = r.memberId + '|' + r.date;
    byKey[key] = byKey[key] || { memberId: r.memberId, name: r.name, date: r.date };
    byKey[key][r.period] = r;
  });
  approvedIzin.forEach(p => {
    const key = p.memberId + '|' + p.date;
    byKey[key] = byKey[key] || { memberId: p.memberId, name: p.memberName, date: p.date };
    if(p.period === 'sehari'){ byKey[key].izinPagi = true; byKey[key].izinSore = true; }
    else if(p.period === 'pagi') byKey[key].izinPagi = true;
    else if(p.period === 'sore') byKey[key].izinSore = true;
  });

  const summaryRows = Object.values(byKey).map(entry => {
    const pStatus = sessionStatus(entry.pagi, entry.izinPagi);
    const sStatus = sessionStatus(entry.sore, entry.izinSore);
    const summary = dailySummaryLabel(pStatus, sStatus);
    const joki = !!(entry.pagi && entry.pagi.joki) || !!(entry.sore && entry.sore.joki);
    return { ...entry, pStatus, sStatus, summary, joki };
  }).sort((a,b) => (a.date+a.name < b.date+b.name ? 1 : -1));

  const flaggedCount = summaryRows.filter(r => r.joki).length;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="eyebrow">Kesimpulan Kehadiran Harian</div>
      <button class="btn btn-outline" id="btn_export_kesimpulan" style="width:auto;padding:8px 12px;font-size:12.5px;">⬇ Export CSV</button>
    </div>
    <p class="small muted" style="margin-bottom:10px;">Gabungan sesi pagi &amp; sore jadi satu status harian — ini yang dipakai untuk laporan kehadiran.</p>
    ${flaggedCount > 0 ? `<div class="banner banner-danger">⚠ Ada ${flaggedCount} hari dengan indikasi joki (absen tercatat meski izin sudah disetujui).</div>` : ''}
  `;
  if(summaryRows.length === 0){
    card.innerHTML += `<div class="empty">Belum ada data absensi.</div>`;
  } else {
    summaryRows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'member-row';
      row.style = `align-items:flex-start;flex-direction:column;gap:6px;padding:12px 0;${r.joki ? 'background:var(--danger-light);border-radius:8px;padding-left:8px;padding-right:8px;' : ''}`;
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;width:100%;align-items:flex-start;">
          <div>
            <div style="font-weight:700;font-size:14px;">${r.name}</div>
            <div class="small muted">${fmtDate(r.date)}</div>
          </div>
          <div style="text-align:right;">
            <span class="pill ${r.summary.pill}">${r.summary.text}</span>
            ${r.joki ? ' <span class="pill pill-danger" title="Ada izin disetujui di tanggal & sesi yang sama">⚠ CURIGA</span>' : ''}
          </div>
        </div>
        <div class="small muted">${sesiSubtext(r.pagi, r.izinPagi, 'Pagi')} &nbsp;·&nbsp; ${sesiSubtext(r.sore, r.izinSore, 'Sore')}</div>
      `;
      card.appendChild(row);
    });
  }
  body.appendChild(card);

  document.getElementById('btn_export_kesimpulan').onclick = () => {
    const header = ['Nama','Tanggal','Kesimpulan','Pagi','JamPagi','Sore','JamSore','IndikasiJoki'];
    const lines = [header.join(',')];
    summaryRows.forEach(r => {
      const pTxt = r.pStatus === 'invalid' ? 'Luar Radius' : r.pStatus === 'late' ? 'Telat' : r.pStatus === 'ontime' ? 'Hadir' : r.pStatus === 'izin' ? 'Izin' : '-';
      const sTxt = r.sStatus === 'invalid' ? 'Luar Radius' : r.sStatus === 'late' ? 'Telat' : r.sStatus === 'ontime' ? 'Hadir' : r.sStatus === 'izin' ? 'Izin' : '-';
      lines.push([
        r.name, r.date, r.summary.text,
        pTxt, r.pagi ? r.pagi.time : '',
        sTxt, r.sore ? r.sore.time : '',
        r.joki ? 'YA' : ''
      ].map(escCsv).join(','));
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rekap-kesimpulan-' + todayStr() + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  };
}

async function renderIzinAdmin(body){
  body.innerHTML = `<div class="empty">Memuat data izin…</div>`;
  const permits = (await sget(K_PERMITS)) || [];
  const pending = permits.filter(p => p.status === 'pending').sort((a,b) => (a.date < b.date ? 1 : -1));
  const history = permits.filter(p => p.status !== 'pending').sort((a,b) => (a.date < b.date ? 1 : -1));

  body.innerHTML = '';

  const pendingCard = document.createElement('div');
  pendingCard.className = 'card';
  pendingCard.innerHTML = `<div class="eyebrow" style="margin-bottom:10px;">Menunggu Persetujuan (${pending.length})</div>` + (
    pending.length === 0 ? `<div class="empty">Tidak ada pengajuan izin yang menunggu.</div>` : ''
  );
  pending.forEach(p => {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.style = 'align-items:flex-start;flex-direction:column;gap:8px;padding:12px 0;';
    row.innerHTML = `
      <div style="width:100%;">
        <div style="font-weight:700;font-size:14px;">${p.memberName}</div>
        <div class="small muted">${fmtDate(p.date)} · ${p.period === 'sehari' ? 'Sehari Penuh' : (p.period === 'pagi' ? 'Pagi' : 'Sore')}</div>
        <div class="small" style="margin-top:4px;">${p.reason}</div>
      </div>
      <div class="row" style="width:100%;">
        <button class="btn btn-primary" data-act="approve" style="padding:9px 12px;font-size:13px;">Setujui</button>
        <button class="btn btn-danger" data-act="reject" style="padding:9px 12px;font-size:13px;">Tolak</button>
      </div>
    `;
    row.querySelector('[data-act="approve"]').onclick = async () => {
      const fresh = (await sget(K_PERMITS)) || [];
      const updated = fresh.map(x => x.id === p.id ? { ...x, status: 'disetujui', decidedAt: todayStr() + ' ' + nowHMS() } : x);
      await sset(K_PERMITS, updated);
      renderIzinAdmin(body);
    };
    row.querySelector('[data-act="reject"]').onclick = async () => {
      const fresh = (await sget(K_PERMITS)) || [];
      const updated = fresh.map(x => x.id === p.id ? { ...x, status: 'ditolak', decidedAt: todayStr() + ' ' + nowHMS() } : x);
      await sset(K_PERMITS, updated);
      renderIzinAdmin(body);
    };
    pendingCard.appendChild(row);
  });
  body.appendChild(pendingCard);

  const historyCard = document.createElement('div');
  historyCard.className = 'card';
  historyCard.innerHTML = `<div class="eyebrow" style="margin-bottom:6px;">Riwayat Izin</div>` + (
    history.length === 0
      ? `<div class="empty">Belum ada riwayat izin.</div>`
      : history.map(p => `
        <div class="member-row">
          <div>
            <div style="font-weight:600;font-size:14px;">${p.memberName}</div>
            <div class="small muted">${fmtDate(p.date)} · ${p.period === 'sehari' ? 'Sehari Penuh' : (p.period === 'pagi' ? 'Pagi' : 'Sore')} · ${p.reason}</div>
          </div>
          ${izinStatusPill(p)}
        </div>
      `).join('')
  );
  body.appendChild(historyCard);
}

function renderAnggota(body){
  body.innerHTML = '';
  const addCard = document.createElement('div');
  addCard.className = 'card';
  addCard.innerHTML = `
    <div class="eyebrow" style="margin-bottom:10px;">Tambah Anggota</div>
    <div class="row">
      <input id="f_new_name" placeholder="Nama anggota" style="flex:1;">
      <button class="btn btn-primary" id="btn_add_member" style="width:auto;padding:11px 16px;">Tambah</button>
    </div>
    <div id="add_member_err"></div>
    ${state.lastCreatedPin ? `<div class="banner banner-green" style="margin-top:10px;">PIN untuk <b>${state.lastCreatedPin.name}</b>: <span class="mono">${state.lastCreatedPin.pin}</span> — sampaikan ke anggota tersebut.</div>` : ''}
  `;
  body.appendChild(addCard);

  const listCard = document.createElement('div');
  listCard.className = 'card';
  listCard.innerHTML = `<div class="eyebrow" style="margin-bottom:6px;">Daftar Anggota (${state.members.length})</div>`;
  if(state.members.length === 0){
    listCard.innerHTML += `<div class="empty">Belum ada anggota.</div>`;
  } else {
    state.members.forEach(m => {
      const row = document.createElement('div');
      row.className = 'member-row';
      row.innerHTML = `<div><div style="font-weight:600;font-size:14px;">${m.name}</div><div class="mono small muted">PIN: ${m.pin}</div></div>`;
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger';
      delBtn.style = 'width:auto;padding:7px 12px;font-size:12.5px;';
      delBtn.textContent = 'Hapus';
      delBtn.onclick = async () => {
        if(!confirm('Hapus ' + m.name + ' dari kelompok? Riwayat absen tetap tersimpan.')) return;
        state.members = state.members.filter(x => x.id !== m.id);
        await sset(K_MEMBERS, state.members);
        render();
      };
      row.appendChild(delBtn);
      listCard.appendChild(row);
    });
  }
  body.appendChild(listCard);

  document.getElementById('btn_add_member').onclick = async () => {
    const name = document.getElementById('f_new_name').value.trim();
    const errEl = document.getElementById('add_member_err');
    if(!name){ errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Nama tidak boleh kosong.</div>'; return; }
    if(state.members.some(m => m.name.toLowerCase() === name.toLowerCase())){
      errEl.innerHTML = '<div class="banner banner-danger" style="margin-top:8px;">Nama sudah terdaftar.</div>'; return;
    }
    const member = { id: genId(), name, pin: genPin() };
    state.members = [...state.members, member];
    await sset(K_MEMBERS, state.members);
    state.lastCreatedPin = member;
    render();
  };
}

async function renderQr(body){
  body.innerHTML = `<div class="empty">Memuat QR…</div>`;
  const fresh = await ensureTodayQrToken();
  state.config = fresh;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="eyebrow" style="margin-bottom:10px;">QR Absen Hari Ini</div>
    <p class="small muted">Tampilkan atau cetak QR ini di lokasi KKM. Anggota wajib memindai kode ini sebelum absen tercatat. QR otomatis berganti tiap hari.</p>
    <div class="qr-box" id="qr_render"></div>
    <div class="mono small" style="text-align:center;margin-top:10px;color:var(--ink-muted);">Kode manual: <b>${fresh.qrToken}</b></div>
    <button class="btn btn-outline" id="btn_regen_qr" style="margin-top:14px;">Buat Ulang QR (nonaktifkan yang lama)</button>
  `;
  body.innerHTML = '';
  body.appendChild(card);

  new QRCode(document.getElementById('qr_render'), {
    text: fresh.qrToken,
    width: 200,
    height: 200,
    colorDark: '#2B2A22',
    colorLight: '#ffffff',
  });

  document.getElementById('btn_regen_qr').onclick = async () => {
    if(!confirm('QR lama akan langsung tidak berlaku dan anggota harus memindai QR baru. Lanjutkan?')) return;
    const updated = { ...state.config, qrToken: genQrToken(), qrDate: todayStr() };
    await sset(K_CONFIG, updated);
    state.config = updated;
    renderQr(body);
  };
}

function renderPengaturan(body){
  body.innerHTML = '';
  const c = state.config;
  const card = document.createElement('div');
  card.className = 'card stack';
  card.innerHTML = `
    <div class="field"><label>Nama Kelompok</label><input id="f_name" value="${c.name}"></div>
    <div class="field"><label>PIN Admin</label><input id="f_adminpin" value="${c.adminPin}"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Pagi</label><input id="f_ms" type="time" value="${c.morningStart}"></div>
      <div class="field" style="flex:1;"><label>Selesai Tepat Waktu Pagi</label><input id="f_me" type="time" value="${c.morningEnd}"></div>
    </div>
    <div class="field"><label>Batas Akhir Telat Pagi</label><input id="f_mle" type="time" value="${c.morningLateEnd || c.morningEnd}"></div>
    <div class="row">
      <div class="field" style="flex:1;"><label>Mulai Sore</label><input id="f_es" type="time" value="${c.eveningStart}"></div>
      <div class="field" style="flex:1;"><label>Selesai Tepat Waktu Sore</label><input id="f_ee" type="time" value="${c.eveningEnd}"></div>
    </div>
    <div class="field"><label>Batas Akhir Telat Sore</label><input id="f_ele" type="time" value="${c.eveningLateEnd || c.eveningEnd}"></div>
    <div class="field">
      <label>Titik Lokasi KKM</label>
      <button class="btn btn-outline" id="btn_locate" type="button">📍 Perbarui dengan Lokasi Saat Ini</button>
      <div id="loc_status" class="small muted" style="margin-top:8px;"></div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;"><label class="mono">Latitude</label><input id="f_lat" value="${c.lat}"></div>
      <div class="field" style="flex:1;"><label class="mono">Longitude</label><input id="f_lng" value="${c.lng}"></div>
    </div>
    <div class="field"><label>Radius Toleransi (meter)</label><input id="f_radius" type="number" value="${c.radius}"></div>
    <div id="save_status"></div>
    <button class="btn btn-primary" id="btn_save">Simpan Perubahan</button>
  `;
  body.appendChild(card);

  document.getElementById('btn_locate').onclick = () => {
    const statusEl = document.getElementById('loc_status');
    statusEl.textContent = 'Mengambil lokasi…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('f_lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('f_lng').value = pos.coords.longitude.toFixed(6);
        statusEl.textContent = 'Lokasi diperbarui (akurasi ~' + Math.round(pos.coords.accuracy) + 'm). Jangan lupa Simpan.';
      },
      err => { statusEl.textContent = 'Gagal: ' + err.message; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  };

  document.getElementById('btn_save').onclick = async () => {
    const newConfig = {
      name: document.getElementById('f_name').value.trim(),
      adminPin: document.getElementById('f_adminpin').value.trim(),
      morningStart: document.getElementById('f_ms').value,
      morningEnd: document.getElementById('f_me').value,
      morningLateEnd: document.getElementById('f_mle').value,
      eveningStart: document.getElementById('f_es').value,
      eveningEnd: document.getElementById('f_ee').value,
      eveningLateEnd: document.getElementById('f_ele').value,
      lat: parseFloat(document.getElementById('f_lat').value),
      lng: parseFloat(document.getElementById('f_lng').value),
      radius: parseInt(document.getElementById('f_radius').value, 10),
    };
    await sset(K_CONFIG, newConfig);
    state.config = newConfig;
    document.getElementById('save_status').innerHTML = '<div class="banner banner-green">Pengaturan tersimpan.</div>';
  };
}

boot();
</script>
</body>
</html>
